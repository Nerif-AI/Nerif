name: Release and Publish

on:
  push:
    branches: [ main ]
    paths:
      - 'pyproject.toml'
  workflow_dispatch:

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check.outputs.version_changed }}
      new_version: ${{ steps.check.outputs.new_version }}
      prev_version: ${{ steps.check.outputs.prev_version }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Check for version bump
      id: check
      run: |
        CURRENT_VERSION=$(python3 -c "
        import re
        with open('pyproject.toml') as f:
            m = re.search(r'^version\s*=\s*\"([^\"]+)\"', f.read(), re.M)
            print(m.group(1) if m else '')
        ")
        echo "Current version: $CURRENT_VERSION"

        # Find the previous commit that touched pyproject.toml
        PREV_COMMIT=$(git log --skip=1 -1 --format=%H -- pyproject.toml 2>/dev/null || echo "")

        if [ -n "$PREV_COMMIT" ]; then
          PREVIOUS_VERSION=$(git show "$PREV_COMMIT:pyproject.toml" 2>/dev/null | python3 -c "
        import re, sys
        m = re.search(r'^version\s*=\s*\"([^\"]+)\"', sys.stdin.read(), re.M)
        print(m.group(1) if m else '')
        " || echo "")
        else
          PREVIOUS_VERSION=""
        fi
        echo "Previous version: $PREVIOUS_VERSION"

        if [ -n "$CURRENT_VERSION" ] && [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ]; then
          echo "Version changed from $PREVIOUS_VERSION to $CURRENT_VERSION"
          echo "version_changed=true" >> $GITHUB_OUTPUT
          echo "new_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "prev_version=$PREVIOUS_VERSION" >> $GITHUB_OUTPUT
        else
          echo "No version change detected"
          echo "version_changed=false" >> $GITHUB_OUTPUT
        fi

  release:
    needs: check-version
    if: needs.check-version.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build

    - name: Build package
      run: python -m build

    - name: Generate release notes
      id: notes
      env:
        VERSION: ${{ needs.check-version.outputs.new_version }}
        PREV_VERSION: ${{ needs.check-version.outputs.prev_version }}
      run: |
        {
          echo 'RELEASE_NOTES<<NOTES_EOF'

          # Try to get commits since previous version tag
          if git rev-parse "v$PREV_VERSION" >/dev/null 2>&1; then
            echo "## What's Changed"
            echo ""
            git log "v$PREV_VERSION..HEAD" --pretty=format:"- %s" --no-merges | head -50
          else
            echo "## Release v$VERSION"
          fi

          echo ""
          echo ""
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/v${PREV_VERSION}...v${VERSION}"
          echo 'NOTES_EOF'
        } >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        VERSION: ${{ needs.check-version.outputs.new_version }}
      run: |
        if gh release view "v$VERSION" >/dev/null 2>&1; then
          echo "Release v$VERSION already exists, skipping"
        else
          gh release create "v$VERSION" \
            --title "Release v$VERSION" \
            --notes "${{ steps.notes.outputs.RELEASE_NOTES }}" \
            dist/*
        fi

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        verbose: true
        skip-existing: true
